<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JYM | Calculator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="calculator" role="application" aria-label="Calculator">
      <!-- Display Screen -->
      <div class="display" aria-live="polite" aria-atomic="true">
        <div
          class="display-history"
          id="display-history"
          aria-label="Previous expression"
        ></div>
        <div
          class="display-current"
          id="display-current"
          aria-label="Current value"
        >
          0
        </div>
      </div>

      <!-- Button grid -->
      <div class="btn-grid" id="btn-grid">
        <!-- Row 1: Special Buttons -->
        <button
          class="btn btn-special"
          data-action="clear"
          aria-label="Clear all"
        >
          AC
        </button>
        <button
          class="btn btn-special"
          data-action="sign"
          aria-label="Toggle sign"
        >
          +/−
        </button>
        <button
          class="btn btn-special"
          data-action="percent"
          aria-label="Percent"
        >
          %
        </button>
        <button class="btn btn-operator" data-operator="÷" aria-label="Divide">
          ÷
        </button>

        <!-- Row 2 -->
        <button class="btn" data-digit="7">7</button>
        <button class="btn" data-digit="8">8</button>
        <button class="btn" data-digit="9">9</button>
        <button
          class="btn btn-operator"
          data-operator="×"
          aria-label="Multiply"
        >
          ×
        </button>

        <!-- Row 3 -->
        <button class="btn" data-digit="4">4</button>
        <button class="btn" data-digit="5">5</button>
        <button class="btn" data-digit="6">6</button>
        <button
          class="btn btn-operator"
          data-operator="−"
          aria-label="Subtract"
        >
          −
        </button>

        <!-- Row 4 -->
        <button class="btn" data-digit="1">1</button>
        <button class="btn" data-digit="2">2</button>
        <button class="btn" data-digit="3">3</button>
        <button class="btn btn-operator" data-operator="+" aria-label="Add">
          +
        </button>

        <!-- Row 5 -->
        <button class="btn btn-zero" data-digit="0" aria-label="Zero">0</button>
        <button class="btn" data-action="decimal" aria-label="Decimal point">
          .
        </button>
        <button class="btn btn-equals" data-action="equals" aria-label="Equals">
          =
        </button>
      </div>

      <p class="keyboard-hint">keyboard supported · esc to clear</p>
    </div>

    <script src="./script.js" defer></script>
  </body>
</html>
